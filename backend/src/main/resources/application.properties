spring.application.name=backend
spring.datasource.url=jdbc:mysql://localhost:3306/skip_q
spring.datasource.username=root
spring.datasource.password=11052006

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
file.upload-dir=uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.baseline-description=Baseline before SaaS conversion
spring.flyway.locations=classpath:db/migration
spring.jpa.open-in-view=false

# JWT authentication
# NOTE: same pattern as the datasource credentials above -- committed in
# plaintext for now. Moving both to environment variables / a secrets
# manager is tracked as follow-up security work, not part of this change.
jwt.secret=1f9c2e6a7b3d4f5061829a3b4c5d6e7f8091a2b3c4d5e6f7081920a3b4c5d6e7
jwt.expiration-ms=7200000

# Notification cleanup
# Retention windows are in hours; cron runs every 15 minutes by default
# (well within the 10-15 minute range) so stale notifications don't pile up
# without hammering the database every minute.
notification.retention.student-hours=24
notification.retention.admin-hours=1
notification.cleanup.cron=0 */15 * * * *

# Email (OTP delivery) — Gmail SMTP.
# Credentials come from environment variables only:
#   MAIL_USERNAME       the sending Gmail address
#   MAIL_APP_PASSWORD   a Gmail App Password (NOT the account password)
# Never commit real values for these here.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_USERNAME}

# OTP verification (registration + password reset)
otp.expiry-minutes=5
otp.max-attempts=5
otp.resend-cooldown-seconds=60
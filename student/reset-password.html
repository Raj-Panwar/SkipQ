<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - SkipQ</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Outfit:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/student.css">
</head>

<body class="auth-body">

  <div class="auth-screen">

    <header class="auth-topbar">
      <span class="brand-mark">
        <svg viewBox="0 0 40 40" width="26" height="26" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="3" />
          <path d="M20 11 L20 20 L26 24" stroke="currentColor" stroke-width="3" stroke-linecap="round"
            stroke-linejoin="round" />
          <circle cx="29" cy="29" r="4.5" fill="currentColor" />
        </svg>
      </span>
      <span class="brand-name-dark">SkipQ</span>
    </header>

    <main class="auth-sheet page-fade-in" aria-label="Reset password">

      <div class="sheet-handle"></div>

      <!-- Step 1: OTP verification -->
      <section id="otpSection">

        <div class="auth-heading register-heading">
          <h2>Verify your email</h2>
          <p>
            We sent a 6-digit code to
            <strong id="otpEmailDisplay">your email</strong>.
          </p>
        </div>

        <div id="otpAlert" class="alert alert-error" hidden></div>

        <form id="otpForm" class="form" novalidate>

          <div class="form-group">
            <label for="otpDigit0">Enter OTP</label>
            <div class="otp-input-group">
              <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="otp-digit" id="otpDigit0" autocomplete="one-time-code">
              <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="otp-digit">
              <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="otp-digit">
              <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="otp-digit">
              <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="otp-digit">
              <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="otp-digit">
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-block" id="verifyBtn">
            <span class="btn-label">Verify Code</span>
          </button>

          <div class="resend-row">
            <button type="button" class="link-button" id="resendBtn" disabled>Resend OTP</button>
            <span class="countdown-timer" id="countdownTimer"></span>
          </div>

        </form>

      </section>

      <!-- Step 2: New password (revealed after OTP verification) -->
      <section id="passwordSection" hidden>

        <div class="auth-heading register-heading">
          <h2>Set a new password</h2>
          <p>Choose a new password for your account.</p>
        </div>

        <div id="passwordAlert" class="alert alert-error" hidden></div>

        <form id="passwordForm" class="form" novalidate>

          <div class="form-group">
            <label for="newPassword">New Password</label>
            <div class="input-with-action">
              <input type="password" id="newPassword" name="newPassword" class="input"
                placeholder="Create a new password" required>
              <button type="button" class="input-action" id="togglePassword">Show</button>
            </div>
            <p class="field-error" id="passwordError" hidden></p>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm New Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" class="input"
              placeholder="Confirm your new password" required>
            <p class="field-error" id="confirmPasswordError" hidden></p>
          </div>

          <button type="submit" class="btn btn-primary btn-block" id="resetBtn">
            <span class="btn-label">Reset Password</span>
          </button>

        </form>

      </section>

      <p class="auth-switch">
        Remembered your password?
        <a href="./login.html">Log in</a>
      </p>

    </main>

  </div>

  <script type="module" src="../js/student/resetPasswordPage.js"></script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu — SkipQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Outfit:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/student.css">
</head>

<body class="app-body">

  <header class="app-header">
    <div class="app-header-row">
      <a href="./menu.html" class="brand-mini">
        <span class="brand-mark-light">
          <svg viewBox="0 0 40 40" width="22" height="22" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="3" />
            <path d="M20 11 L20 20 L26 24" stroke="currentColor" stroke-width="3" stroke-linecap="round"
              stroke-linejoin="round" />
            <circle cx="29" cy="29" r="4.5" fill="currentColor" />
          </svg>
        </span>
        <span class="brand-name-light">SkipQ</span>
      </a>
      <div class="header-actions">
        <button id="notificationBell"
        class="notification-btn"
        type="button"
        aria-label="Notifications">

    <svg viewBox="0 0 24 24" width="22" height="22" fill="none"
         xmlns="http://www.w3.org/2000/svg">
        <path
            d="M12 3a5 5 0 0 0-5 5v2.3c0 .7-.2 1.3-.6 1.9L5 14.5V16h14v-1.5l-1.4-2.3c-.4-.6-.6-1.2-.6-1.9V8a5 5 0 0 0-5-5Z"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"/>

        <path
            d="M10 19a2 2 0 0 0 4 0"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"/>
    </svg>

    <span id="notificationBadge"
          class="notification-badge"
          hidden>
        0
    </span>

</button>


        <a href="./cart.html" class="cart-icon-link" aria-label="View cart">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 4h2l2.4 12.4a2 2 0 0 0 2 1.6h7.7a2 2 0 0 0 2-1.6L21 8H6" stroke="currentColor"
              stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
            <circle cx="9" cy="21" r="1.4" fill="currentColor" />
            <circle cx="18" cy="21" r="1.4" fill="currentColor" />
          </svg>
          <span class="cart-badge" id="cartBadge" hidden>0</span>
        </a>
      </div>
    </div>

    <div class="search-bar">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8" />
        <path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
      </svg>
      <input type="search" id="searchInput" class="search-input" placeholder="Search notebooks, pens, prints…"
        aria-label="Search products">
    </div>
  </header>

  <main class="app-main page-fade-in">

   <section class="welcome-block">
  <p class="welcome-greeting" id="welcomeGreeting">Welcome</p>

  <p class="welcome-insight">
    <span class="status-dot" aria-hidden="true"></span>
    Currently serving token
    <strong id="currentServingToken">Loading...</strong>
  </p>
</section>

<div class="queue-status-card">
    <div class="queue-title">Estimated Wait</div>

    <div id="estimated-wait-time" class="queue-wait">
        Calculating...
    </div>

    <div class="queue-subtitle">
        If you order now
    </div>
</div>

    <nav class="category-tabs" id="categoryTabs" aria-label="Product categories">
      <button class="category-chip is-active" data-category="All" type="button">All</button>
      <button class="category-chip" data-category="Notebooks" type="button">Notebooks</button>
      <button class="category-chip" data-category="Pens" type="button">Pens</button>
      <button class="category-chip" data-category="Printing" type="button">Printing</button>
      <button class="category-chip" data-category="Files" type="button">Files</button>
      <button class="category-chip" data-category="Others" type="button">Others</button>
    </nav>

    <section class="product-grid" id="productGrid" aria-live="polite">
      <!-- Product cards injected by menuPage.js -->
    </section>

    <p class="empty-state" id="emptyState" hidden>
      No products found. Try a different search or category.
    </p>

  </main>

  <div class="cart-summary-bar" id="cartSummaryBar" hidden>
    <div class="cart-summary-info">
      <span class="cart-summary-count" id="cartSummaryCount">0 items</span>
      <span class="cart-summary-total" id="cartSummaryTotal">₹0</span>
    </div>
    <a href="./cart.html" class="btn btn-primary" id="viewCartBtn">View cart</a>
  </div>
  <div id="notificationPanel" class="notification-panel" hidden>
    <ul id="notificationList"></ul>
  </div>

  <script type="module" src="../js/student/menuPage.js"></script>
</body>

</html>

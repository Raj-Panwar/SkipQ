<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order history — SkipQ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Outfit:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/student.css">
</head>
<body class="app-body">

  <header class="app-header app-header-simple">
    <div class="app-header-row">
      <a href="./menu.html" class="back-link" aria-label="Back to menu">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
      <h1 class="page-title">Order history</h1>
      <span class="header-spacer" aria-hidden="true"></span>
    </div>
  </header>

  <main class="app-main">

    <section class="history-list" id="historyList" aria-live="polite">
      <!-- Order cards injected by historyPage.js -->
    </section>

    <div class="empty-state-block" id="emptyHistoryState" hidden>
      <p class="empty-state-icon" aria-hidden="true">🧾</p>
      <h2>No orders yet</h2>
      <p>Once you place an order, it will show up here with its token and status.</p>
      <a href="./menu.html" class="btn btn-primary">Browse menu</a>
    </div>

  </main>

  <script type="module" src="../js/student/historyPage.js"></script>
</body>
</html>
